AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Data Lake (Bronze/Silver/Gold)

Resources:

  BronzeBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub nyc-taxi-bronze-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled

  SilverBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub nyc-taxi-silver-${AWS::AccountId}

  GoldBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub nyc-taxi-gold-${AWS::AccountId}

Outputs:

  BronzeBucket:
    Value: !Ref BronzeBucket
    Export:
      Name: BronzeBucketName

  SilverBucket:
    Value: !Ref SilverBucket
    Export:
      Name: SilverBucketName

  GoldBucket:
    Value: !Ref GoldBucket
    Export:
      Name: GoldBucketName
