AWSTemplateFormatVersion: '2010-09-09'

Description: NYC Taxi Data Lake Storage

Resources:

  DataLakeBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: nyc-taxi-platform

      VersioningConfiguration:
        Status: Enabled

      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

Outputs:

  BucketName:
    Value: !Ref DataLakeBucket
