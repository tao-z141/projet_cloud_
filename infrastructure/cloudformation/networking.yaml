AWSTemplateFormatVersion: '2010-09-09'
Description: Networking layer for NYC Taxi Data Platform (Free Tier - eu-west-3)

Resources:

  # =========================
  # VPC
  # =========================
  MainVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: nyc-taxi-vpc

  # =========================
  # Public Subnet (AZ-a) — Kafka EC2
  # =========================
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: eu-west-3a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: nyc-public-subnet

  # =========================
  # Private Subnet (AZ-a) — Glue + RDS
  # Glue nécessite un subnet SANS route internet directe
  # =========================
  PrivateSubnetGlue:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: eu-west-3a
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: nyc-private-subnet-glue

  # =========================
  # Security Group Kafka
  # =========================
  KafkaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Kafka + SSH access
      VpcId: !Ref MainVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 9092
          ToPort: 9092
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: nyc-kafka-sg

  # =========================
  # Security Group Glue
  # Glue exige une règle self-referencing (trafic entre workers)
  # =========================
  GlueSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Glue jobs
      VpcId: !Ref MainVPC
      Tags:
        - Key: Name
          Value: nyc-glue-sg

  GlueSecurityGroupSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref GlueSecurityGroup
      IpProtocol: tcp
      FromPort: 0
      ToPort: 65535
      SourceSecurityGroupId: !Ref GlueSecurityGroup

  # =========================
  # Internet Gateway
  # =========================
  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MainVPC
      InternetGatewayId: !Ref InternetGateway

  # =========================
  # Route Table Public
  # =========================
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MainVPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # Route Table Private (pas de route internet — requis par Glue)
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MainVPC

  PrivateSubnetGlueAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetGlue
      RouteTableId: !Ref PrivateRouteTable

Outputs:
  VPCId:
    Value: !Ref MainVPC
    Export:
      Name: MainVPC

  PublicSubnetId:
    Value: !Ref PublicSubnet
    Export:
      Name: PublicSubnetId

  PrivateSubnetGlueId:
    Value: !Ref PrivateSubnetGlue
    Export:
      Name: PrivateSubnetGlueId

  KafkaSecurityGroupId:
    Value: !Ref KafkaSecurityGroup
    Export:
      Name: KafkaSecurityGroupId

  GlueSecurityGroupId:
    Value: !Ref GlueSecurityGroup
    Export:
      Name: GlueSecurityGroupId
