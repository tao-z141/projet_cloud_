AWSTemplateFormatVersion: '2010-09-09'
Description: Networking layer for NYC Taxi Data Platform (Free Tier - eu-west-3)

Resources:

  # =========================
  # VPC
  # =========================
  MainVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: nyc-taxi-vpc

  # =========================
  # Public Subnet
  # =========================
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: eu-west-3a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: nyc-public-subnet

  # =========================
  # Security Group (IMPORTANT AJOUT)
  # =========================
  KafkaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Kafka + SSH access
      VpcId: !Ref MainVPC
      SecurityGroupIngress:

        # SSH
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        # Kafka
        - IpProtocol: tcp
          FromPort: 9092
          ToPort: 9092
          CidrIp: 0.0.0.0/0

      Tags:
        - Key: Name
          Value: nyc-kafka-sg

  # =========================
  # Internet Gateway
  # =========================
  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MainVPC
      InternetGatewayId: !Ref InternetGateway

  # =========================
  # Route Table
  # =========================
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MainVPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

# =========================
# OUTPUTS
# =========================
Outputs:

  VPCId:
    Value: !Ref MainVPC
    Export:
      Name: MainVPC

  PublicSubnetId:
    Value: !Ref PublicSubnet
    Export:
      Name: PublicSubnetId

  KafkaSecurityGroupId:
    Value: !Ref KafkaSecurityGroup
    Export:
      Name: KafkaSecurityGroupId
