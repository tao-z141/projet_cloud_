AWSTemplateFormatVersion: '2010-09-09'
Description: Databases layer (RDS PostgreSQL + DynamoDB) — Free Tier optimized

Resources:

  # ======================
  # DynamoDB — 100% gratuit
  # ======================
  RealtimeEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: realtime_events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: S
        - AttributeName: taxi_id
          AttributeType: S
      KeySchema:
        - AttributeName: event_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: taxi_id-index
          KeySchema:
            - AttributeName: taxi_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: nyc-taxi-platform

  # ======================
  # SUBNET PRIVÉ 2 (AZ-b) — requis pour DBSubnetGroup (2 AZ minimum)
  # ======================
  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue MainVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: eu-west-3b
      Tags:
        - Key: Name
          Value: nyc-private-subnet-2

  # ======================
  # SUBNET GROUP RDS
  # ======================
  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for NYC Taxi RDS
      SubnetIds:
        - !ImportValue PublicSubnetId
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: nyc-rds-subnet-group

  # ======================
  # SECURITY GROUP RDS
  # Autorise Glue Security Group à accéder au port 5432
  # ======================
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL access from Glue and VPC
      VpcId: !ImportValue MainVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 10.0.0.0/16
        # Autoriser Glue Security Group explicitement
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !ImportValue GlueSecurityGroupId
      Tags:
        - Key: Name
          Value: nyc-rds-sg

  # ======================
  # SECRETS MANAGER
  # ======================
  DBPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: nyc-db-password
      Description: Password for NYC Taxi RDS PostgreSQL
      GenerateSecretString:
        SecretStringTemplate: '{"username":"postgres"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  # ======================
  # RDS POSTGRES — FREE TIER
  # ======================
  TaxiPostgres:
    Type: AWS::RDS::DBInstance
    DependsOn:
      - RDSSubnetGroup
      - RDSSecurityGroup
      - DBPasswordSecret
    Properties:
      DBInstanceIdentifier: nyc-taxi-db
      Engine: postgres
      EngineVersion: "15"
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      StorageType: gp2
      StorageEncrypted: false
      DBName: taxidb
      MasterUsername: postgres
      MasterUserPassword:
        Fn::Sub: "{{resolve:secretsmanager:${DBPasswordSecret}::password}}"
      DBSubnetGroupName: !Ref RDSSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      PubliclyAccessible: false
      BackupRetentionPeriod: 1
      MultiAZ: false
      DeletionProtection: false
      Tags:
        - Key: Project
          Value: nyc-taxi-platform

  # ======================
  # GLUE CONNECTION vers RDS
  # Permet à Glue de se connecter au RDS dans le VPC
  # ======================
  GlueRDSConnection:
    Type: AWS::Glue::Connection
    DependsOn: TaxiPostgres
    Properties:
      CatalogId: !Ref AWS::AccountId
      ConnectionInput:
        Name: nyc-rds-connection
        ConnectionType: JDBC
        ConnectionProperties:
          JDBC_CONNECTION_URL: !Sub
            - "jdbc:postgresql://${Endpoint}:5432/taxidb"
            - Endpoint: !GetAtt TaxiPostgres.Endpoint.Address
          USERNAME: postgres
          PASSWORD: !Sub "{{resolve:secretsmanager:${DBPasswordSecret}::password}}"
          JDBC_ENFORCE_SSL: "false"
        PhysicalConnectionRequirements:
          SubnetId: !ImportValue PrivateSubnetGlueId
          SecurityGroupIdList:
            - !ImportValue GlueSecurityGroupId
          AvailabilityZone: eu-west-3a

Outputs:
  RDSAddress:
    Value: !GetAtt TaxiPostgres.Endpoint.Address
    Export:
      Name: RDSEndpoint

  RDSPort:
    Value: !GetAtt TaxiPostgres.Endpoint.Port
    Export:
      Name: RDSPort

  DynamoTable:
    Value: !Ref RealtimeEventsTable
    Export:
      Name: DynamoTableName

  DBSecretArn:
    Value: !Ref DBPasswordSecret
    Export:
      Name: DBSecretArn

  GlueConnectionName:
    Value: !Ref GlueRDSConnection
    Export:
      Name: GlueConnectionName
