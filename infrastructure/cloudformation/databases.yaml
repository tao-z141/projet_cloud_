AWSTemplateFormatVersion: '2010-09-09'
Description: Databases layer (RDS PostgreSQL + DynamoDB) — Free Tier optimized

Resources:

  # ======================
  # DynamoDB — 100% gratuit
  # ======================
  RealtimeEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: realtime_events
      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: S
        - AttributeName: taxi_id
          AttributeType: S

      KeySchema:
        - AttributeName: event_id
          KeyType: HASH

      GlobalSecondaryIndexes:
        - IndexName: taxi_id-index
          KeySchema:
            - AttributeName: taxi_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

      Tags:
        - Key: Project
          Value: nyc-taxi-platform

  # ======================
  # SUBNET PRIVÉ 2 (AZ-b) — requis pour DBSubnetGroup (2 AZ minimum)
  # ======================
  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue MainVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: eu-west-3b
      Tags:
        - Key: Name
          Value: nyc-private-subnet-2

  # ======================
  # SUBNET GROUP RDS — 2 subnets dans le MÊME VPC (MainVPC)
  # ======================
  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for NYC Taxi RDS
      SubnetIds:
        - !ImportValue PublicSubnetId
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: nyc-rds-subnet-group

  # ======================
  # SECURITY GROUP RDS — MÊME VPC que le SubnetGroup
  # ======================
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL access from within VPC only
      VpcId: !ImportValue MainVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: nyc-rds-sg

  # ======================
  # SECRETS MANAGER
  # ======================
  DBPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: nyc-db-password
      Description: Password for NYC Taxi RDS PostgreSQL
      GenerateSecretString:
        SecretStringTemplate: '{"username":"postgres"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  # ======================
  # RDS POSTGRES — FREE TIER
  # ======================
  TaxiPostgres:
    Type: AWS::RDS::DBInstance
    DependsOn:
      - RDSSubnetGroup
      - RDSSecurityGroup
      - DBPasswordSecret
    Properties:
      DBInstanceIdentifier: nyc-taxi-db
      Engine: postgres
      EngineVersion: "15"
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      StorageType: gp2
      StorageEncrypted: false

      DBName: taxidb
      MasterUsername: postgres
      MasterUserPassword:
        Fn::Sub: "{{resolve:secretsmanager:${DBPasswordSecret}::password}}"

      DBSubnetGroupName: !Ref RDSSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup

      PubliclyAccessible: false
      BackupRetentionPeriod: 1
      MultiAZ: false
      DeletionProtection: false

      Tags:
        - Key: Project
          Value: nyc-taxi-platform

Outputs:
  RDSAddress:
    Value: !GetAtt TaxiPostgres.Endpoint.Address
    Export:
      Name: RDSEndpoint

  RDSPort:
    Value: !GetAtt TaxiPostgres.Endpoint.Port
    Export:
      Name: RDSPort

  DynamoTable:
    Value: !Ref RealtimeEventsTable
    Export:
      Name: DynamoTableName

  DBSecretArn:
    Value: !Ref DBPasswordSecret
    Export:
      Name: DBSecretArn
