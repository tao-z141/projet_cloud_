AWSTemplateFormatVersion: '2010-09-09'
Description: Kafka EC2 (Free Tier - eu-west-3 Paris)

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access

Resources:

  KafkaInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
      KeyName: !Ref KeyPairName
      SubnetId: !ImportValue PublicSubnetId
      SecurityGroupIds:
        - !ImportValue KafkaSecurityGroupId

      UserData:
        Fn::Base64:
          Fn::Join:
            - "\n"
            - - "#!/bin/bash"
              - "yum update -y"
              - "yum install java-17-amazon-corretto wget -y"
              - "cd /tmp"
              - "wget -q https://downloads.apache.org/kafka/3.7.1/kafka_2.13-3.7.1.tgz || wget -q https://archive.apache.org/dist/kafka/3.7.1/kafka_2.13-3.7.1.tgz"
              - "tar -xzf kafka_2.13-3.7.1.tgz"
              - "mv kafka_2.13-3.7.1 /opt/kafka"
              - "UUID=$(/opt/kafka/bin/kafka-storage.sh random-uuid)"
              - "/opt/kafka/bin/kafka-storage.sh format -t $UUID -c /opt/kafka/config/kraft/server.properties"
              - "/opt/kafka/bin/kafka-server-start.sh -daemon /opt/kafka/config/kraft/server.properties"
              - "sleep 15"
              - "/opt/kafka/bin/kafka-topics.sh --create --topic taxi-stream-events --bootstrap-server localhost:9092 --partitions 3 --replication-factor 1"
              - !Sub "/opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource KafkaInstance --region ${AWS::Region}"

      Tags:
        - Key: Name
          Value: nyc-kafka-broker

    CreationPolicy:
      ResourceSignal:
        Timeout: PT10M

Outputs:
  KafkaPublicIP:
    Value: !GetAtt KafkaInstance.PublicIp
    Export:
      Name: KafkaPublicIP

  KafkaInstanceId:
    Value: !Ref KafkaInstance
    Export:
      Name: KafkaInstanceId
