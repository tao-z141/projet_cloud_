AWSTemplateFormatVersion: '2010-09-09'
Description: Kafka EC2 (Free Tier - eu-west-3 Paris)

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access

Resources:

  KafkaInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro

      # Amazon Linux 2023 AMI — eu-west-3 (Paris)
      # AMI officielle récupérée via SSM Parameter Store (toujours à jour)
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"

      KeyName: !Ref KeyPairName

      SubnetId: !ImportValue PublicSubnetId

      SecurityGroupIds:
        - !ImportValue KafkaSecurityGroupId

      # CloudFormation attend que le signal cfn-signal soit envoyé
      # pour marquer l'instance comme créée avec succès
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Ne PAS utiliser set -e ici — on gère les erreurs manuellement
          # pour que cfn-signal soit toujours appelé

          yum update -y
          yum install java-17-amazon-corretto wget -y

          # Kafka 3.7.1 — miroir Apache stable
          KAFKA_VERSION=3.7.1
          SCALA_VERSION=2.13
          KAFKA_TGZ="kafka_${SCALA_VERSION}-${KAFKA_VERSION}.tgz"

          cd /tmp
          wget -q "https://downloads.apache.org/kafka/${KAFKA_VERSION}/${KAFKA_TGZ}"

          if [ $? -ne 0 ]; then
            # Fallback miroir archive si downloads.apache.org indisponible
            wget -q "https://archive.apache.org/dist/kafka/${KAFKA_VERSION}/${KAFKA_TGZ}"
          fi

          tar -xzf ${KAFKA_TGZ}
          mv kafka_${SCALA_VERSION}-${KAFKA_VERSION} /opt/kafka

          # Configurer KRaft (Kafka sans Zookeeper)
          CLUSTER_UUID=$(/opt/kafka/bin/kafka-storage.sh random-uuid)

          /opt/kafka/bin/kafka-storage.sh format \
            -t $CLUSTER_UUID \
            -c /opt/kafka/config/kraft/server.properties

          # Démarrer Kafka
          /opt/kafka/bin/kafka-server-start.sh -daemon \
            /opt/kafka/config/kraft/server.properties

          # Attendre que Kafka soit prêt
          sleep 15

          # Créer le topic
          /opt/kafka/bin/kafka-topics.sh \
            --create \
            --topic taxi-stream-events \
            --bootstrap-server localhost:9092 \
            --partitions 3 \
            --replication-factor 1

          echo "Kafka setup complete"

          # Signal CloudFormation que l'instance est prête
          /opt/aws/bin/cfn-signal -e $? \
            --stack ${AWS::StackName} \
            --resource KafkaInstance \
            --region ${AWS::Region}

      Tags:
        - Key: Name
          Value: nyc-kafka-broker

    # CloudFormation attend le signal cfn-signal avant de marquer CREATE_COMPLETE
    CreationPolicy:
      ResourceSignal:
        Timeout: PT10M   # 10 minutes max pour l'install

Outputs:
  KafkaPublicIP:
    Value: !GetAtt KafkaInstance.PublicIp
    Export:
      Name: KafkaPublicIP

  KafkaInstanceId:
    Value: !Ref KafkaInstance
    Export:
      Name: KafkaInstanceId
