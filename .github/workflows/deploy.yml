name: Deploy NYC Taxi Platform

on:
  push:
    branches:
      - main
    # Déclenche le workflow UNIQUEMENT si un fichier CloudFormation change
    paths:
      - 'infrastructure/cloudformation/**.yaml'
      - 'scripts/deploy.sh'
  workflow_dispatch:
    inputs:
      key_pair_name:
        description: 'EC2 Key Pair name (overrides secret)'
        required: false

env:
  AWS_DEFAULT_REGION: eu-west-3

jobs:
  validate:
    name: Validate CloudFormation Templates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Validate networking.yaml
        run: aws cloudformation validate-template --template-body file://infrastructure/cloudformation/networking.yaml

      - name: Validate storage.yaml
        run: aws cloudformation validate-template --template-body file://infrastructure/cloudformation/storage.yaml

      - name: Validate databases.yaml
        run: aws cloudformation validate-template --template-body file://infrastructure/cloudformation/databases.yaml

      - name: Validate kafka.yaml
        run: aws cloudformation validate-template --template-body file://infrastructure/cloudformation/kafka.yaml

      - name: Validate api.yaml
        run: aws cloudformation validate-template --template-body file://infrastructure/cloudformation/api.yaml

      - name: Validate orchestration.yaml
        run: aws cloudformation validate-template --template-body file://infrastructure/cloudformation/orchestration.yaml

  deploy:
    name: Deploy CloudFormation Stacks
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Resolve Key Pair name
        id: keypair
        run: |
          KEY="${{ github.event.inputs.key_pair_name }}"
          if [ -z "$KEY" ]; then KEY="${{ secrets.KEY_PAIR_NAME }}"; fi
          if [ -z "$KEY" ]; then KEY="nyc-taxi-key"; fi
          echo "name=$KEY" >> $GITHUB_OUTPUT

      - name: Make deploy script executable
        run: chmod +x scripts/deploy.sh

      - name: Deploy all stacks
        run: scripts/deploy.sh "${{ steps.keypair.outputs.name }}"
        env:
          AWS_DEFAULT_REGION: eu-west-3
