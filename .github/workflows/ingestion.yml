name: Run Data Ingestion

on:
  workflow_dispatch:  # Lancement manuel uniquement

jobs:
  ingest:
    name: Ingest Taxi + Weather data to S3 Bronze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow boto3 requests

      - name: Ingest Taxi data → S3 bronze/taxi/
        run: python ingestion/taxi_api_ingestion.py

      - name: Ingest Weather data → S3 bronze/weather/
        run: python ingestion/weather_ingestion.py
