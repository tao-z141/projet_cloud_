name: Setup Glue Jobs

on:
  workflow_dispatch:  # Lancement manuel

jobs:
  setup-glue:
    name: Upload scripts S3 + Create Glue Jobs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      # ================================
      # 1. Upload scripts vers S3
      # ================================
      - name: Upload Glue scripts to S3
        run: |
          aws s3 cp glue_jobs/bronze_to_silver.py s3://nyc-taxi-platform/scripts/bronze_to_silver.py
          aws s3 cp glue_jobs/silver_to_gold.py s3://nyc-taxi-platform/scripts/silver_to_gold.py
          echo "Scripts uploaded"

      # ================================
      # 2. Créer le job bronze_to_silver
      # ================================
      - name: Create or update bronze_to_silver Glue job
        run: |
          # Vérifie si le job existe déjà
          if aws glue get-job --job-name bronze_to_silver 2>/dev/null; then
            echo "Job exists, updating..."
            aws glue update-job \
              --job-name bronze_to_silver \
              --job-update '{
                "Role": "nyc-taxi-glue-role",
                "Command": {
                  "Name": "glueetl",
                  "ScriptLocation": "s3://nyc-taxi-platform/scripts/bronze_to_silver.py",
                  "PythonVersion": "3"
                },
                "DefaultArguments": {
                  "--job-language": "python",
                  "--TempDir": "s3://nyc-taxi-platform/tmp/",
                  "--enable-metrics": "true"
                },
                "GlueVersion": "4.0",
                "NumberOfWorkers": 2,
                "WorkerType": "G.1X",
                "Timeout": 60
              }'
          else
            echo "Creating job..."
            aws glue create-job \
              --name bronze_to_silver \
              --role nyc-taxi-glue-role \
              --command '{
                "Name": "glueetl",
                "ScriptLocation": "s3://nyc-taxi-platform/scripts/bronze_to_silver.py",
                "PythonVersion": "3"
              }' \
              --default-arguments '{
                "--job-language": "python",
                "--TempDir": "s3://nyc-taxi-platform/tmp/",
                "--enable-metrics": "true"
              }' \
              --glue-version "4.0" \
              --number-of-workers 2 \
              --worker-type "G.1X" \
              --timeout 60
          fi

      # ================================
      # 3. Créer le job silver_to_gold
      # ================================
      - name: Create or update silver_to_gold Glue job
        run: |
          if aws glue get-job --job-name silver_to_gold 2>/dev/null; then
            echo "Job exists, updating..."
            aws glue update-job \
              --job-name silver_to_gold \
              --job-update '{
                "Role": "nyc-taxi-glue-role",
                "Command": {
                  "Name": "glueetl",
                  "ScriptLocation": "s3://nyc-taxi-platform/scripts/silver_to_gold.py",
                  "PythonVersion": "3"
                },
                "DefaultArguments": {
                  "--job-language": "python",
                  "--TempDir": "s3://nyc-taxi-platform/tmp/",
                  "--enable-metrics": "true"
                },
                "GlueVersion": "4.0",
                "NumberOfWorkers": 2,
                "WorkerType": "G.1X",
                "Timeout": 60
              }'
          else
            echo "Creating job..."
            aws glue create-job \
              --name silver_to_gold \
              --role nyc-taxi-glue-role \
              --command '{
                "Name": "glueetl",
                "ScriptLocation": "s3://nyc-taxi-platform/scripts/silver_to_gold.py",
                "PythonVersion": "3"
              }' \
              --default-arguments '{
                "--job-language": "python",
                "--TempDir": "s3://nyc-taxi-platform/tmp/",
                "--enable-metrics": "true"
              }' \
              --glue-version "4.0" \
              --number-of-workers 2 \
              --worker-type "G.1X" \
              --timeout 60
          fi

      - name: Done
        run: |
          echo "Glue jobs created:"
          aws glue get-job --job-name bronze_to_silver --query 'Job.Name'
          aws glue get-job --job-name silver_to_gold --query 'Job.Name'
